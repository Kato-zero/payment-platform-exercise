<!DOCTYPE html>
<html>
<head>
    <title>Simple Payment System</title>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Arial, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .container {
            background: white;
            border-radius: 20px;
            padding: 40px;
            max-width: 500px;
            width: 100%;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
        }
        h2 {
            color: #333;
            margin-bottom: 30px;
            text-align: center;
            font-size: 28px;
        }
        .form-group {
            margin-bottom: 20px;
        }
        label {
            display: block;
            margin-bottom: 8px;
            color: #555;
            font-weight: 600;
            font-size: 14px;
        }
        input {
            width: 100%;
            padding: 12px 15px;
            border: 2px solid #e0e0e0;
            border-radius: 10px;
            font-size: 16px;
            transition: border-color 0.3s;
        }
        input:focus {
            outline: none;
            border-color: #667eea;
        }
        button {
            width: 100%;
            padding: 14px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            border-radius: 10px;
            font-size: 18px;
            font-weight: 600;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 10px;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 20px rgba(102, 126, 234, 0.4);
        }
        button:active {
            transform: translateY(0);
        }
        button:disabled {
            opacity: 0.6;
            cursor: not-allowed;
        }
        #result {
            margin-top: 25px;
            padding: 20px;
            border-radius: 10px;
            background: #f8f9fa;
            display: none;
        }
        #result.show {
            display: block;
        }
        #result.success {
            border-left: 4px solid #28a745;
        }
        #result.error {
            border-left: 4px solid #dc3545;
        }
        #result.loading {
            border-left: 4px solid #ffc107;
        }
        .result-title {
            font-weight: 600;
            margin-bottom: 10px;
            font-size: 16px;
        }
        .result-content {
            font-size: 14px;
            color: #555;
            word-break: break-all;
            white-space: pre-wrap;
        }
        .spinner {
            display: inline-block;
            width: 20px;
            height: 20px;
            border: 3px solid #f3f3f3;
            border-top: 3px solid #667eea;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin-right: 10px;
        }
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        .note {
            margin-top: 20px;
            padding: 15px;
            background: #fff3cd;
            border-radius: 8px;
            font-size: 13px;
            color: #856404;
        }
        .note strong {
            display: block;
            margin-bottom: 5px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>💳 Make Payment</h2>
        
        <form id="paymentForm">
            <div class="form-group">
                <label for="amount">Amount (ZMW)</label>
                <input type="number" id="amount" value="1" min="0.01" step="0.01" required>
            </div>
            
            <div class="form-group">
                <label for="accountNumber">Mobile Number</label>
                <input type="text" id="accountNumber" value="260972643310" placeholder="260XXXXXXXXX" required>
            </div>
            
            <div class="form-group">
                <label for="email">Email Address</label>
                <input type="email" id="email" value="customer@example.com" required>
            </div>
            
            <div class="form-group">
                <label for="narration">Description</label>
                <input type="text" id="narration" value="payment for bread" placeholder="What's this payment for?">
            </div>
            
            <button type="submit" id="payButton">
                <span id="buttonText">Pay Now</span>
            </button>
        </form>
        
        <div id="result">
            <div class="result-title" id="resultTitle"></div>
            <div class="result-content" id="resultContent"></div>
        </div>

        <div class="note">
            <strong>⚠️ Important:</strong>
            <span id="configNote">Replace the callback URLs in the code with your actual domain</span>
        </div>
    </div>

    <script>
        document.getElementById('paymentForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            
            const resultDiv = document.getElementById('result');
            const resultTitle = document.getElementById('resultTitle');
            const resultContent = document.getElementById('resultContent');
            const payButton = document.getElementById('payButton');
            const buttonText = document.getElementById('buttonText');

            // Show loading state
            resultDiv.className = 'show loading';
            resultTitle.innerHTML = '<span class="spinner"></span> Processing payment...';
            resultContent.textContent = 'Please wait...';
            payButton.disabled = true;
            buttonText.textContent = 'Processing...';

            // Get form values
            const payload = {
                amount: parseFloat(document.getElementById('amount').value),
                accountNumber: document.getElementById('accountNumber').value.trim(),
                email: document.getElementById('email').value.trim(),
                narration: document.getElementById('narration').value.trim() || 'payment',
                // REPLACE: These URLs should be your actual domain
                callbackUrl: 'https://your-domain.com/callback',
                redirectUrl: 'https://your-domain.com/success',
                backUrl: 'https://your-domain.com/back'
            };

            // Validate
            if (!payload.accountNumber) {
                resultDiv.className = 'show error';
                resultTitle.textContent = '❌ Validation Error';
                resultContent.textContent = 'Please enter a mobile number';
                payButton.disabled = false;
                buttonText.textContent = 'Pay Now';
                return;
            }

            if (payload.amount <= 0) {
                resultDiv.className = 'show error';
                resultTitle.textContent = '❌ Validation Error';
                resultContent.textContent = 'Please enter a valid amount';
                payButton.disabled = false;
                buttonText.textContent = 'Pay Now';
                return;
            }

            try {
                console.log('Sending payment request:', payload);
                
                const response = await fetch('/api/pay', {
                    method: 'POST',
                    headers: { 
                        'Content-Type': 'application/json',
                        'Accept': 'application/json'
                    },
                    body: JSON.stringify(payload)
                });

                console.log('Response status:', response.status);
                
                const data = await response.json();
                console.log('Response data:', data);

                if (response.ok && data.success) {
                    resultDiv.className = 'show success';
                    resultTitle.textContent = '✅ Payment Initiated Successfully!';
                    resultContent.textContent = JSON.stringify({
                        referenceId: data.referenceId,
                        status: 'Pending',
                        message: data.message || 'Waiting for payment confirmation',
                        details: data.data
                    }, null, 2);
                } else {
                    throw new Error(data.error || data.message || 'Payment failed');
                }
            } catch (error) {
                console.error('Error:', error);
                resultDiv.className = 'show error';
                resultTitle.textContent = '❌ Payment Failed';
                resultContent.textContent = error.message || 'An unexpected error occurred. Please try again.';
            } finally {
                payButton.disabled = false;
                buttonText.textContent = 'Pay Now';
            }
        });
    </script>
</body>
</html>
